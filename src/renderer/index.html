<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data:;">
  <title>Summoning Stone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window">
    <div class="window-glow"></div>

    <header class="title-bar">
      <div class="brand">
        <span class="brand-mark">⬡</span>
        <span class="brand-name" data-i18n="app.title"></span>
      </div>
      <div class="title-buttons">
        <button id="btn-settings" class="title-button" data-i18n-aria="titleBar.settings" data-i18n-title="titleBar.settings">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="2.2"></circle>
            <path d="M13.2 9.6l1.3.7-1.3 2.3-1.4-.5a5.4 5.4 0 0 1-1.4.8l-.2 1.5h-2.6l-.2-1.5a5.4 5.4 0 0 1-1.4-.8l-1.4.5-1.3-2.3 1.3-.7a5.4 5.4 0 0 1 0-1.6l-1.3-.7 1.3-2.3 1.4.5a5.4 5.4 0 0 1 1.4-.8l.2-1.5h2.6l.2 1.5c.5.2 1 .5 1.4.8l1.4-.5 1.3 2.3-1.3.7a5.4 5.4 0 0 1 0 1.6z"></path>
          </svg>
        </button>
        <button id="btn-minimize" class="title-button" data-i18n-aria="titleBar.minimize" data-i18n-title="titleBar.minimize">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="3" y1="8" x2="13" y2="8"></line>
          </svg>
        </button>
        <button id="btn-close" class="title-button close-btn" data-i18n-aria="titleBar.close" data-i18n-title="titleBar.close">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="4" y1="4" x2="12" y2="12"></line>
            <line x1="12" y1="4" x2="4" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <main class="content">

      <section class="card connect-card">
        <h2 class="card-title" data-i18n="connect.title"></h2>
        <p class="card-desc" data-i18n-html="connect.description"></p>
        <div class="store-links">
          <button class="store-link" id="link-android" data-i18n="connect.androidLink"></button>
          <span class="store-sep">·</span>
          <button class="store-link" id="link-ios" data-i18n="connect.iosLink"></button>
        </div>
        <div class="qr-wrapper">
          <div id="qrcode-container"></div>
          <div class="qr-placeholder" id="qr-placeholder" data-i18n="connect.qrLoading"></div>
        </div>
        <div class="topic-row">
          <span class="topic-label" data-i18n="connect.topicLabel"></span>
          <span id="ntfy-topic-value" class="topic-value"></span>
          <button id="btn-regenerate" class="icon-btn" data-i18n-aria="connect.regenerateTitle" data-i18n-title="connect.regenerateTitle">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8a5 5 0 0 1 8.5-3.5L13 6"></path>
              <path d="M13 3v3h-3"></path>
              <path d="M13 8a5 5 0 0 1-8.5 3.5L3 10"></path>
              <path d="M3 13v-3h3"></path>
            </svg>
          </button>
        </div>
        <button id="btn-test" class="btn btn-ghost btn-block" data-i18n="connect.sendTest"></button>
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="directory.title"></h2>
        <div class="directory-display">
          <span id="directory-value" class="dir-path" data-i18n="directory.none"></span>
        </div>
        <div id="detection-feedback" class="feedback-text"></div>
        <div class="button-row">
          <button id="btn-choose" class="btn btn-ghost" data-i18n="directory.chooseFolder"></button>
          <button id="btn-detect" class="btn btn-ghost" data-i18n="directory.autoDetect"></button>
        </div>
      </section>

      <section class="card log-card" id="log-section">
        <div class="log-header">
          <h2 class="card-title" data-i18n="log.title"></h2>
          <button id="btn-clear-log" class="text-btn" data-i18n="log.clear" disabled></button>
        </div>
        <ul id="log-list" class="log-list"></ul>
        <div id="log-empty" class="log-empty" data-i18n="log.empty"></div>
      </section>

    </main>

    <footer class="status-bar">
      <div class="status-bar-left">
        <div class="status-pill" id="status-indicator">
          <span class="status-dot"></span>
          <span id="monitoring-value" data-i18n="status.stopped"></span>
        </div>
        <span id="monitoring-error" class="status-bar-error"></span>
      </div>
      <button id="btn-start" class="btn btn-go btn-sm"  data-i18n="status.startMonitoring"></button>
      <button id="btn-stop"  class="btn btn-halt btn-sm" data-i18n="status.stopMonitoring"></button>
    </footer>
  </div>

  <div id="store-qr-modal" class="modal-overlay">
    <div class="modal-card store-qr-card">
      <h3 class="modal-title" id="store-qr-title"></h3>
      <div class="qr-wrapper store-qr-wrapper">
        <div id="store-qr-code"></div>
      </div>
      <button id="store-qr-close" class="btn btn-primary btn-block" data-i18n="modals.ok"></button>
    </div>
  </div>

  <div id="auto-modal" class="modal-overlay">
    <div class="modal-card">
      <h3 class="modal-title" data-i18n="modals.autoDetectedHeading"></h3>
      <p id="auto-modal-text" class="modal-body"></p>
      <button id="auto-modal-ok" class="btn btn-primary btn-block" data-i18n="modals.ok"></button>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay">
    <div class="modal-card settings-card">
      <h3 class="modal-title" data-i18n="settings.title"></h3>

      <label class="toggle-row">
        <span class="toggle-label" data-i18n="settings.deleteProcessed"></span>
        <span class="toggle">
          <input type="checkbox" id="chk-delete-processed">
          <span class="toggle-track"></span>
        </span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label" data-i18n="settings.minimizeToTray"></span>
        <span class="toggle">
          <input type="checkbox" id="chk-minimize-tray">
          <span class="toggle-track"></span>
        </span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label" data-i18n="settings.autoStart"></span>
        <span class="toggle">
          <input type="checkbox" id="chk-auto-start">
          <span class="toggle-track"></span>
        </span>
      </label>

      <div class="modal-divider"></div>

      <label class="toggle-row">
        <span class="toggle-label" data-i18n="settings.showEventLog"></span>
        <span class="toggle">
          <input type="checkbox" id="chk-show-event-log">
          <span class="toggle-track"></span>
        </span>
      </label>

      <button id="settings-close" class="btn btn-primary btn-block" data-i18n="settings.done"></button>
    </div>
  </div>

  <div id="regen-modal" class="modal-overlay">
    <div class="modal-card">
      <h3 class="modal-title" data-i18n="modals.regenerateTitle"></h3>
      <p class="modal-body" data-i18n="modals.regenerateBody"></p>
      <div class="button-row modal-actions">
        <button id="regen-cancel"  class="btn btn-ghost"   data-i18n="modals.cancel"></button>
        <button id="regen-confirm" class="btn btn-primary" data-i18n="modals.regenerate"></button>
      </div>
    </div>
  </div>

  <script src="./lib/qrcode.min.js"></script>
  <script src="./locales/en.js"></script>
  <script src="./i18n.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
